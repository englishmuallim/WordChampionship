<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Championship - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>

<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center font-sans">

    <div class="bg-gray-800 p-10 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-400 tracking-tight mb-2">Word Championship</h1>
            <p class="text-gray-400">Yarışma Platformuna Giriş Yapın</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-gray-300 text-sm font-bold mb-2" for="username">Kullanıcı Adı</label>
                <input
                    class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    id="username" type="text" placeholder="Kullanıcı adınızı girin" required>
            </div>

            <div>
                <label class="block text-gray-300 text-sm font-bold mb-2" for="password">Şifre / PIN</label>
                <input
                    class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                    id="password" type="password" placeholder="Şifrenizi girin" required>
            </div>

            <div id="errorMessage"
                class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-2 rounded text-sm text-center">
                Hatalı kullanıcı adı veya şifre!
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition-all transform hover:-translate-y-0.5">
                Giriş Yap
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                // Sunucuya giriş isteği atıyoruz
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Kullanıcı bilgilerini tarayıcıya kaydet
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Rolüne göre ilgili sayfaya yönlendir
                    if (data.user.role === 'admin') window.location.href = '/admin.html';
                    else if (data.user.role === 'jury') window.location.href = '/jury.html';
                    else window.location.href = '/student.html';
                } else {
                    errorDiv.textContent = data.message || "Giriş başarısız!";
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Giriş hatası:", error);
            }
        });
    </script>
</body>

</html>

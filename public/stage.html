<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Championship - Sahne</title>
    <script src="https://cdn.tailwindcss.com/3.4.3"></script>
    <script src="/socket.io/socket.io.js"></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        .timer-active {
            animation: pulse-ring 1s infinite;
        }
    </style>
</head>

<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center font-sans overflow-hidden">

    <div id="standby-screen"
        class="text-center flex flex-col items-center justify-center h-screen w-full absolute z-50 bg-gray-900 transition-opacity duration-500">
        <h1
            class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-400 mb-6 drop-shadow-lg">
            Word Championship</h1>
        <p class="text-3xl text-gray-400 tracking-widest uppercase">Hoşgeldiniz...</p>
    </div>

    <div id="contest-screen" class="w-full max-w-7xl px-8 hidden flex-col h-screen py-8">

        <div id="round-banner"
            class="w-full bg-blue-600 rounded-2xl py-4 shadow-2xl mb-8 flex justify-center border-b-4 border-blue-800">
            <h2 class="text-5xl font-bold tracking-wide" id="round-title">1. Tur - 1. Kelime</h2>
        </div>

        <div id="words-grid" class="relative grid grid-cols-2 grid-rows-2 gap-4 flex-grow w-full">
            <div
                class="bg-sky-600 rounded-tl-3xl rounded-br-xl flex flex-col justify-center items-center shadow-2xl border-4 border-gray-900 transition-transform duration-300 hover:scale-[1.02]">
                <h3 class="text-3xl font-bold text-sky-100 mb-2 uppercase tracking-wider">5. Sınıflar</h3>
                <p class="text-7xl font-extrabold text-white drop-shadow-md text-center" id="word-5-en">...</p>
                <p class="text-4xl text-yellow-300 drop-shadow-md text-center hidden mt-2" id="word-5-tr">...</p>
            </div>

            <div
                class="bg-orange-600 rounded-tr-3xl rounded-bl-xl flex flex-col justify-center items-center shadow-2xl border-4 border-gray-900 transition-transform duration-300 hover:scale-[1.02]">
                <h3 class="text-3xl font-bold text-orange-100 mb-2 uppercase tracking-wider">6. Sınıflar</h3>
                <p class="text-7xl font-extrabold text-white drop-shadow-md text-center" id="word-6-en">...</p>
                <p class="text-4xl text-yellow-300 drop-shadow-md text-center hidden mt-2" id="word-6-tr">...</p>
            </div>

            <div
                class="bg-emerald-600 rounded-bl-3xl rounded-tr-xl flex flex-col justify-center items-center shadow-2xl border-4 border-gray-900 transition-transform duration-300 hover:scale-[1.02]">
                <h3 class="text-3xl font-bold text-emerald-100 mb-2 uppercase tracking-wider">7. Sınıflar</h3>
                <p class="text-7xl font-extrabold text-white drop-shadow-md text-center" id="word-7-en">...</p>
                <p class="text-4xl text-yellow-300 drop-shadow-md text-center hidden mt-2" id="word-7-tr">...</p>
            </div>

            <div
                class="bg-slate-800 rounded-br-3xl rounded-tl-xl flex flex-col justify-center items-center shadow-2xl border-4 border-gray-900 transition-transform duration-300 hover:scale-[1.02]">
                <h3 class="text-3xl font-bold text-slate-300 mb-2 uppercase tracking-wider">8. Sınıflar</h3>
                <p class="text-7xl font-extrabold text-white drop-shadow-md text-center" id="word-8-en">...</p>
                <p class="text-4xl text-yellow-300 drop-shadow-md text-center hidden mt-2" id="word-8-tr">...</p>
            </div>

            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10">
                <div id="timer-circle"
                    class="bg-gray-100 rounded-full w-48 h-48 flex items-center justify-center shadow-[0_0_50px_rgba(0,0,0,0.5)] border-8 border-gray-800 transition-colors duration-500">
                    <span id="stage-timer" class="text-7xl font-black text-gray-800 tabular-nums">25</span>
                </div>
            </div>
        </div>

        <div id="times-up-screen"
            class="hidden flex-col items-center justify-center flex-grow w-full mt-8 animate-pulse">
            <div class="mb-8"><span class="text-9xl drop-shadow-2xl">⏳</span></div>
            <h2 class="text-7xl font-black text-yellow-500 drop-shadow-lg tracking-widest uppercase mb-6">Süre Bitti
            </h2>
            <p
                class="text-4xl text-gray-300 font-semibold bg-gray-800 px-8 py-4 rounded-2xl border border-gray-700 shadow-xl">
                Jüri Değerlendirmesi Bekleniyor...</p>
        </div>

        <div id="leaderboard-screen" class="hidden flex-col items-center justify-center flex-grow w-full mt-4">
            <h2 class="text-6xl font-black text-white mb-8 tracking-tighter drop-shadow-lg">🏆 GÜNCEL PUAN DURUMU</h2>
            <div id="leaderboard-list"
                class="w-full max-w-4xl bg-gray-800/50 rounded-3xl p-8 border-2 border-gray-700 backdrop-blur-sm shadow-2xl flex flex-col gap-4">
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        const standbyScreen = document.getElementById('standby-screen');
        const contestScreen = document.getElementById('contest-screen');
        const wordsGrid = document.getElementById('words-grid');
        const timesUpScreen = document.getElementById('times-up-screen');
        const leaderboardScreen = document.getElementById('leaderboard-screen');
        const leaderboardList = document.getElementById('leaderboard-list');
        const stageTimer = document.getElementById('stage-timer');
        const timerCircle = document.getElementById('timer-circle');

        let timerInterval;
        let stageWordData = null;

        socket.on('new_command', (data) => {
            if (data.action === 'start_round') {
                stageWordData = data.wordData;

                leaderboardScreen.classList.add('hidden');
                timesUpScreen.classList.add('hidden');
                wordsGrid.classList.remove('hidden');
                wordsGrid.classList.add('grid');

                document.getElementById('word-5-en').textContent = data.wordData.grade_5_word;
                document.getElementById('word-6-en').textContent = data.wordData.grade_6_word;
                document.getElementById('word-7-en').textContent = data.wordData.grade_7_word;
                document.getElementById('word-8-en').textContent = data.wordData.grade_8_word;

                document.getElementById('word-5-tr').textContent = "";
                document.getElementById('word-5-tr').classList.add('hidden');
                document.getElementById('word-6-tr').textContent = "";
                document.getElementById('word-6-tr').classList.add('hidden');
                document.getElementById('word-7-tr').textContent = "";
                document.getElementById('word-7-tr').classList.add('hidden');
                document.getElementById('word-8-tr').textContent = "";
                document.getElementById('word-8-tr').classList.add('hidden');

                document.getElementById('round-title').textContent = `${data.wordData.round_no}. Tur - ${data.wordData.order_no}. Kelime`;

                standbyScreen.style.opacity = '0';
                setTimeout(() => {
                    standbyScreen.classList.add('hidden');
                    contestScreen.classList.remove('hidden');
                    contestScreen.classList.add('flex');
                }, 500);

                // --- DİNAMİK SÜRE KALKANI (F5 İÇİN) ---
                let totalDuration = data.duration || 25; // Toplam yarışma süresi
                let timeLeft = totalDuration;

                // Eğer sunucudan başlama zamanı geldiyse geçen süreyi hesapla ve düş
                if (data.startTime) {
                    let passedSeconds = Math.floor((Date.now() - data.startTime) / 1000);
                    timeLeft = totalDuration - passedSeconds;
                }

                // Eğer sayfa yenilendiğinde süre çoktan bitmişse direkt Süre Bitti ekranına al
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerCircle.classList.remove('timer-active');
                    stageTimer.textContent = "0";
                    wordsGrid.classList.remove('grid');
                    wordsGrid.classList.add('hidden');
                    timesUpScreen.classList.remove('hidden');
                    timesUpScreen.classList.add('flex');
                    return;
                }
                // --------------------------------------

                stageTimer.textContent = timeLeft;
                timerCircle.classList.add('timer-active');

                // Renk durumunu kalan süreye göre ayarla
                if (timeLeft <= 5) {
                    timerCircle.classList.replace('bg-gray-100', 'bg-red-200');
                    stageTimer.classList.replace('text-gray-800', 'text-red-700');
                } else {
                    timerCircle.classList.replace('bg-red-200', 'bg-gray-100');
                    stageTimer.classList.replace('text-gray-800', 'text-gray-800');
                }

                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--;
                    stageTimer.textContent = timeLeft;

                    if (timeLeft === 5) {
                        timerCircle.classList.replace('bg-gray-100', 'bg-red-200');
                        stageTimer.classList.replace('text-gray-800', 'text-red-700');
                    }

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerCircle.classList.remove('timer-active');
                        stageTimer.textContent = "0";

                        wordsGrid.classList.remove('grid');
                        wordsGrid.classList.add('hidden');
                        timesUpScreen.classList.remove('hidden');
                        timesUpScreen.classList.add('flex');
                    }
                }, 1000);
            }

            else if (data.action === 'show_answers' && stageWordData) {
                timesUpScreen.classList.add('hidden');
                wordsGrid.classList.remove('hidden');
                wordsGrid.classList.add('grid');

                document.getElementById('word-5-tr').textContent = stageWordData.grade_5_answer;
                document.getElementById('word-5-tr').classList.remove('hidden');
                document.getElementById('word-6-tr').textContent = stageWordData.grade_6_answer;
                document.getElementById('word-6-tr').classList.remove('hidden');
                document.getElementById('word-7-tr').textContent = stageWordData.grade_7_answer;
                document.getElementById('word-7-tr').classList.remove('hidden');
                document.getElementById('word-8-tr').textContent = stageWordData.grade_8_answer;
                document.getElementById('word-8-tr').classList.remove('hidden');
            }

            else if (data.action === 'hide_answers') {
                document.getElementById('word-5-tr').classList.add('hidden');
                document.getElementById('word-6-tr').classList.add('hidden');
                document.getElementById('word-7-tr').classList.add('hidden');
                document.getElementById('word-8-tr').classList.add('hidden');
            }

            else if (data.action === 'clear_stage') {
                clearInterval(timerInterval);
                contestScreen.classList.add('hidden');
                contestScreen.classList.remove('flex');
                standbyScreen.classList.remove('hidden');
                setTimeout(() => standbyScreen.style.opacity = '1', 50);
                timerCircle.classList.remove('timer-active');
            }
        });

        socket.on('leaderboard_data', (groupedData) => {
            console.log("Sunucudan gelen şampiyonlar listesi:", groupedData);

            // KRİTİK ÇÖZÜM: F5 atılınca gizli olan ana kutuları (contest-screen) görünür yap!
            standbyScreen.classList.add('hidden');
            standbyScreen.style.opacity = '0';
            contestScreen.classList.remove('hidden');
            contestScreen.classList.add('flex');

            // Diğer yarışma içi ekranları kapat
            timesUpScreen.classList.remove('flex');
            timesUpScreen.classList.add('hidden');
            wordsGrid.classList.remove('grid');
            wordsGrid.classList.add('hidden');

            // Eğer varsa mavi başlık kutusunu gizle (Önceki adımda id eklemiştik)
            const banner = document.getElementById('round-banner');
            if (banner) {
                banner.classList.remove('flex');
                banner.classList.add('hidden');
            }

            // LİDERLİK TABLOSUNU AÇ
            leaderboardScreen.classList.remove('hidden');
            leaderboardScreen.classList.add('flex');

            // LİSTEYİ TEMİZLE VE GENİŞLET
            leaderboardList.innerHTML = '';
            leaderboardList.className = 'w-full max-w-7xl bg-gray-800/50 rounded-3xl p-8 border-2 border-gray-700 backdrop-blur-sm shadow-2xl flex flex-col gap-4 mt-8';

            // 4'LÜ IZGARA (GRID) OLUŞTUR
            const gridContainer = document.createElement('div');
            gridContainer.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full";

            const grades = ["5", "6", "7", "8"];

            grades.forEach(grade => {
                const students = (groupedData && groupedData[grade]) ? groupedData[grade] : [];
                const gradeCol = document.createElement('div');
                gradeCol.className = "bg-gray-800/90 rounded-3xl p-5 border border-gray-600 shadow-2xl flex flex-col gap-4 transition-transform hover:-translate-y-1";

                let htmlContent = `<h2 class="text-4xl font-black text-center text-blue-400 mb-2 border-b-2 border-gray-600 pb-4 shadow-sm">${grade}. SINIF</h2>`;

                if (students.length === 0) {
                    htmlContent += `<div class="flex-1 flex items-center justify-center min-h-[200px]"><p class="text-center text-gray-500 font-bold text-xl">Henüz puan alan yok</p></div>`;
                } else {
                    students.forEach((item, index) => {
                        let rankStyle = "text-gray-500 text-2xl";
                        let cardStyle = "bg-gray-900/60";

                        if (index === 0) {
                            rankStyle = "text-yellow-400 text-4xl drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]"; // Altın
                            cardStyle = "bg-gradient-to-r from-yellow-900/50 to-gray-900/80 border border-yellow-600/50 shadow-lg";
                        } else if (index === 1) {
                            rankStyle = "text-gray-300 text-3xl drop-shadow-[0_0_8px_rgba(209,213,219,0.8)]"; // Gümüş
                            cardStyle = "bg-gradient-to-r from-gray-700/50 to-gray-900/80 border border-gray-500/50";
                        } else if (index === 2) {
                            rankStyle = "text-amber-600 text-3xl drop-shadow-[0_0_8px_rgba(217,119,6,0.8)]"; // Bronz
                            cardStyle = "bg-gradient-to-r from-amber-900/40 to-gray-900/80 border border-amber-700/50";
                        }

                        htmlContent += `
                            <div class="flex justify-between items-center ${cardStyle} p-4 rounded-xl transition-all hover:scale-[1.02]">
                                <div class="flex items-center gap-4 overflow-hidden">
                                    <span class="font-black w-10 text-center ${rankStyle}">#${index + 1}</span>
                                    <p class="text-xl font-bold text-white truncate max-w-[160px]">${item.name}</p>
                                </div>
                                <div class="text-3xl font-black text-green-400 drop-shadow-md">${item.score}</div>
                            </div>
                        `;
                    });
                }

                gradeCol.innerHTML = htmlContent;
                gridContainer.appendChild(gradeCol);
            });

            leaderboardList.appendChild(gridContainer);
        });
    </script>
</body>

</html>
